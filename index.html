<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --accent: #e94560;
            --text: #eaeaea;
            --dice-bg: #0f3460;
            --dot: #e94560;
            --glow: rgba(233, 69, 96, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(15, 52, 96, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .dice-container {
            position: relative;
        }

        .dice {
            width: 160px;
            height: 160px;
            background: var(--dice-bg);
            border-radius: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 28px;
            gap: 8px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 40px var(--glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .dice.rolling {
            animation: roll 0.6s ease-out;
        }

        @keyframes roll {
            0% { transform: rotateZ(0deg) scale(1); }
            25% { transform: rotateZ(90deg) scale(0.9); }
            50% { transform: rotateZ(180deg) scale(0.85); }
            75% { transform: rotateZ(270deg) scale(0.9); }
            100% { transform: rotateZ(360deg) scale(1); }
        }

        .dot {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: transparent;
            transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .dot.active {
            background: var(--dot);
            box-shadow: 0 0 12px var(--glow), 0 0 24px rgba(233, 69, 96, 0.2);
            transform: scale(1);
            animation: dotPop 0.3s ease forwards;
        }

        @keyframes dotPop {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .roll-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.3);
        }

        .roll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 69, 96, 0.4);
        }

        .roll-btn:active {
            transform: translateY(1px) scale(0.97);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }
    </style>
</head>
<body>
    <div class="dice-container">
        <div class="dice" id="dice">
            <div class="dot" data-pos="1"></div>
            <div class="dot" data-pos="2"></div>
            <div class="dot" data-pos="3"></div>
            <div class="dot" data-pos="4"></div>
            <div class="dot" data-pos="5"></div>
            <div class="dot" data-pos="6"></div>
            <div class="dot" data-pos="7"></div>
            <div class="dot" data-pos="8"></div>
            <div class="dot" data-pos="9"></div>
        </div>
    </div>

    <button class="roll-btn" id="rollBtn">Roll Dice</button>


    <script>
        const dice = document.getElementById('dice');
        const rollBtn = document.getElementById('rollBtn');
        const dots = document.querySelectorAll('.dot');

        // Dot positions for each face (using a 3x3 grid, positions 1-9)
        const faces = {
            1: [5],
            2: [3, 7],
            3: [3, 5, 7],
            4: [1, 3, 7, 9],
            5: [1, 3, 5, 7, 9],
            6: [1, 3, 4, 6, 7, 9]
        };

        function showFace(number) {
            dots.forEach(dot => dot.classList.remove('active'));

            const activePositions = faces[number];
            activePositions.forEach((pos, index) => {
                const dot = document.querySelector(`.dot[data-pos="${pos}"]`);
                setTimeout(() => {
                    dot.classList.add('active');
                }, index * 60);
            });
        }

        function rollDice() {
            rollBtn.disabled = true;
            dice.classList.add('rolling');
            dots.forEach(dot => dot.classList.remove('active'));

            setTimeout(() => {
                const number = Math.floor(Math.random() * 6) + 1;
                dice.classList.remove('rolling');
                showFace(number);
                rollBtn.disabled = false;
            }, 600);
        }

        rollBtn.addEventListener('click', rollDice);

        // Show initial state
        showFace(1);
    </script>
</body>
</html>
